name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  BACKEND_IMAGE: itsaffnco/saffnco_learning_backend_app
  NETWORK_NAME: learningjourney

jobs:
  # ─── BUILD BACKEND ────────────────────────────────────────────────────────
  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:latest
          cache-to: type=inline

  # ─── DEPLOY ───────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [build-backend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Copy only the files needed to build the frontend image on the server.
      # This avoids pulling nginx:alpine on GitHub's shared runner IPs
      # (which hits Docker Hub rate limits). The server caches the image.
      - name: Copy frontend build artifacts to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "frontend/public/dist,frontend/docker/nginx.conf,frontend/Dockerfile"
          target: "$HOME/learningjourney/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          BACKEND_ENV: ${{ secrets.BACKEND_ENV }}
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASS: ${{ secrets.DOCKER_PASSWORD }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          envs: BACKEND_ENV,DOCKER_USER,DOCKER_PASS
          script_stop: true
          script: |
            set -e

            BACKEND_IMAGE="itsaffnco/saffnco_learning_backend_app:latest"
            NETWORK="learningjourney"

            echo "==> Login to Docker Hub"
            echo "$DOCKER_PASS" | docker login -u "$DOCKER_USER" --password-stdin

            echo "==> Creating Docker network: $NETWORK"
            docker network create $NETWORK 2>/dev/null || echo "Network already exists, skipping."

            echo "==> Preparing env directory"
            mkdir -p "$HOME/learningjourney"

            echo "==> Writing backend .env"
            printf '%s' "$BACKEND_ENV" > "$HOME/learningjourney/backend.env"
            chmod 600 "$HOME/learningjourney/backend.env"

            # ── BACKEND ──────────────────────────────────────────────────
            echo "==> Stopping old backend container..."
            docker stop learningjourney_backend 2>/dev/null || true
            docker rm learningjourney_backend 2>/dev/null || true

            echo "==> Removing old backend image..."
            docker rmi $BACKEND_IMAGE 2>/dev/null || true

            echo "==> Pulling new backend image..."
            docker pull $BACKEND_IMAGE

            echo "==> Ensuring persistent storage directory exists..."
            mkdir -p "$HOME/learningjourney/storage/app/public/videos"
            mkdir -p "$HOME/learningjourney/storage/app/public/images"
            mkdir -p "$HOME/learningjourney/storage/app/public/lesson-images"
            mkdir -p "$HOME/learningjourney/storage/logs"
            mkdir -p "$HOME/learningjourney/storage/framework/cache"
            mkdir -p "$HOME/learningjourney/storage/framework/sessions"
            mkdir -p "$HOME/learningjourney/storage/framework/views"

            echo "==> Starting backend container..."
            docker run -d \
              --name learningjourney_backend \
              --network $NETWORK \
              --env-file "$HOME/learningjourney/backend.env" \
              --add-host host.docker.internal:host-gateway \
              -p 2012:80 \
              -v "$HOME/learningjourney/storage:/var/www/html/storage" \
              --restart unless-stopped \
              $BACKEND_IMAGE

            echo "==> Running storage:link and migrations..."
            sleep 5
            docker exec learningjourney_backend php artisan storage:link --force
            docker exec learningjourney_backend php artisan migrate --force
            docker exec learningjourney_backend mkdir -p /var/www/html/storage/app/public/lesson-audio

            # ── FRONTEND ─────────────────────────────────────────────────
            # Build image on the server — nginx:alpine gets pulled once and
            # stays cached. No Docker Hub pull on GitHub Actions runner.
            echo "==> Building frontend image on server..."
            cd "$HOME/learningjourney/frontend"
            docker build -t learningjourney_frontend_local:latest .

            echo "==> Restarting frontend container..."
            docker stop learningjourney_frontend 2>/dev/null || true
            docker rm learningjourney_frontend 2>/dev/null || true
            docker run -d \
              --name learningjourney_frontend \
              --network $NETWORK \
              -p 2013:80 \
              --restart unless-stopped \
              learningjourney_frontend_local:latest

            echo "==> Cleaning up dangling images..."
            docker image prune -f

            echo "==> Verifying containers are running..."
            docker ps --filter "name=learningjourney_" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            echo ""
            echo "✓ Deployment complete!"
            echo "  Frontend : http://${{ secrets.SERVER_HOST }}:2013"
            echo "  Backend  : http://${{ secrets.SERVER_HOST }}:2012"

      - name: Purge Cloudflare cache
        continue-on-error: true
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' | tee /tmp/cf_purge.json
          if ! grep -q '"success":true' /tmp/cf_purge.json; then
            echo "Cloudflare purge failed (add CF_ZONE_ID and CF_API_TOKEN secrets to fix):"
            cat /tmp/cf_purge.json
          else
            echo "✓ Cloudflare cache purged"
          fi
